name: Run Spike Tests

on:
  workflow_dispatch: # Manual trigger only

jobs:
  spike-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Might be longer for multiple spike tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Setup MongoDB
        uses: supercharge/mongodb-github-action@1.11.0
        with:
          mongodb-version: '7.0'

      - name: Setup k6
        uses: grafana/setup-k6-action@v1        

      - name: Verify k6 installation
        run: k6 version

      - name: Install root dependencies
        run: npm install

      - name: Install client dependencies
        run: npm install
        working-directory: ./client

      - name: Run spike tests
        run: npm run test:spike
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
          BRAINTREE_MERCHANT_ID: ${{ secrets.BRAINTREE_MERCHANT_ID }}
          BRAINTREE_PUBLIC_KEY: ${{ secrets.BRAINTREE_PUBLIC_KEY }}
          BRAINTREE_PRIVATE_KEY: ${{ secrets.BRAINTREE_PRIVATE_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Upload spike test reports
        if: always() # Upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: spike-test-reports-${{ github.run_number }}
          path: test-results/spike/
          retention-days: 7
